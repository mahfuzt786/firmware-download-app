# =============================================================================
# Security Configuration
# =============================================================================
# Admin panel is protected with a custom login page.
# Default credentials: admin / admin123
# IMPORTANT: Change these credentials for production use.
# =============================================================================
security:
    password_hashers:
        Symfony\Component\Security\Core\User\InMemoryUser: plaintext

    providers:
        admin_users:
            memory:
                users:
                    admin:
                        password: 'admin123'
                        roles: ['ROLE_ADMIN']

    firewalls:
        # Allow static assets without authentication
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        # API endpoint - no authentication required (public)
        api:
            pattern: ^/api
            security: false

        # Admin panel + login page - form-based authentication
        admin:
            pattern: ^/admin
            provider: admin_users
            form_login:
                login_path: admin_login
                check_path: admin_login
                default_target_path: admin_software_versions_index
                enable_csrf: true
            logout:
                path: admin_logout
                target: admin_login

        # Public pages - no authentication
        main:
            lazy: true

    # Role-based access control rules
    access_control:
        - { path: ^/admin/login, roles: PUBLIC_ACCESS }
        - { path: ^/admin, roles: ROLE_ADMIN }
